<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200">
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .group { fill:#ffffff; stroke:#94a3b8; stroke-width:2; stroke-dasharray:8 6; rx:18; }
      .box { fill:#ffffff; stroke:#2563eb; stroke-width:2.2; rx:10; }
      .service { fill:#fff7ed; stroke:#ea580c; stroke-width:2.2; rx:10; }
      .external { fill:#f0fdf4; stroke:#16a34a; stroke-width:2.2; rx:10; }
      .head { fill:#dbeafe; stroke:#2563eb; stroke-width:2.2; }
      .head-service { fill:#ffedd5; stroke:#ea580c; stroke-width:2.2; }
      .head-external { fill:#dcfce7; stroke:#16a34a; stroke-width:2.2; }
      .title { font:700 30px Arial, sans-serif; fill:#0f172a; }
      .group-title { font:700 18px Arial, sans-serif; fill:#475569; }
      .name { font:700 17px Arial, sans-serif; fill:#0f172a; }
      .txt { font:14px Consolas, monospace; fill:#334155; }
      .small { font:13px Arial, sans-serif; fill:#475569; }
      .line { fill:none; stroke:#475569; stroke-width:2.2; }
      .dependency { fill:none; stroke:#64748b; stroke-width:2; stroke-dasharray:7 5; marker-end:url(#arrow); }
      .assoc { fill:none; stroke:#475569; stroke-width:2.2; }
      .diamond { fill:#475569; }
      .label { font:13px Arial, sans-serif; fill:#334155; paint-order:stroke; stroke:#f8fafc; stroke-width:5px; stroke-linejoin:round; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1920" height="1200" class="bg"/>
  <text x="960" y="48" text-anchor="middle" class="title">Hình 3.2. Sơ đồ UML lớp rút gọn của hệ thống NhaTroPro</text>

  <!-- Domain group -->
  <rect x="35" y="80" width="1370" height="1080" class="group"/>
  <text x="60" y="112" class="group-title">Các lớp miền nghiệp vụ</text>

  <!-- Account -->
  <g transform="translate(75 145)">
    <rect width="275" height="175" class="box"/>
    <path d="M0 42 H275" class="head"/>
    <path d="M0 113 H275" class="line"/>
    <text x="137.5" y="27" text-anchor="middle" class="name">Account</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ fullName: string</text>
    <text x="14" y="109" class="txt">+ status: AccountStatus</text>
    <text x="14" y="138" class="txt">+ updateProfile()</text>
    <text x="14" y="160" class="txt">+ updatePreferences()</text>
  </g>

  <!-- Building -->
  <g transform="translate(435 145)">
    <rect width="250" height="175" class="box"/>
    <path d="M0 42 H250" class="head"/>
    <path d="M0 113 H250" class="line"/>
    <text x="125" y="27" text-anchor="middle" class="name">Building</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ name: string</text>
    <text x="14" y="109" class="txt">+ address: string</text>
    <text x="14" y="138" class="txt">+ addRoom()</text>
    <text x="14" y="160" class="txt">+ updateBuilding()</text>
  </g>

  <!-- Room -->
  <g transform="translate(780 145)">
    <rect width="290" height="220" class="box"/>
    <path d="M0 42 H290" class="head"/>
    <path d="M0 151 H290" class="line"/>
    <text x="145" y="27" text-anchor="middle" class="name">Room</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ roomNumber: string</text>
    <text x="14" y="109" class="txt">+ monthlyRent: bigint</text>
    <text x="14" y="131" class="txt">+ availability: RoomStatus</text>
    <text x="14" y="176" class="txt">+ isAvailable(): boolean</text>
    <text x="14" y="198" class="txt">+ setMaintenance()</text>
  </g>

  <!-- Tenant -->
  <g transform="translate(1125 145)">
    <rect width="240" height="175" class="box"/>
    <path d="M0 42 H240" class="head"/>
    <path d="M0 113 H240" class="line"/>
    <text x="120" y="27" text-anchor="middle" class="name">Tenant</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ fullName: string</text>
    <text x="14" y="109" class="txt">+ phone: string</text>
    <text x="14" y="138" class="txt">+ updateProfile()</text>
    <text x="14" y="160" class="txt">+ attachIdentity()</text>
  </g>

  <!-- Contract -->
  <g transform="translate(600 450)">
    <rect width="320" height="245" class="box"/>
    <path d="M0 42 H320" class="head"/>
    <path d="M0 171 H320" class="line"/>
    <text x="160" y="27" text-anchor="middle" class="name">Contract</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ startDate: date</text>
    <text x="14" y="109" class="txt">+ endDate: date</text>
    <text x="14" y="131" class="txt">+ monthlyRent: bigint</text>
    <text x="14" y="153" class="txt">+ status: ContractStatus</text>
    <text x="14" y="196" class="txt">+ activate()</text>
    <text x="14" y="218" class="txt">+ terminate()</text>
    <text x="14" y="240" class="txt">+ residentCount(): number</text>
  </g>

  <!-- ContractMember -->
  <g transform="translate(1000 450)">
    <rect width="280" height="185" class="box"/>
    <path d="M0 42 H280" class="head"/>
    <path d="M0 129 H280" class="line"/>
    <text x="140" y="27" text-anchor="middle" class="name">ContractMember</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ fullName: string</text>
    <text x="14" y="109" class="txt">+ relationship: string</text>
    <text x="14" y="154" class="txt">+ linkTenant()</text>
    <text x="14" y="176" class="txt">+ updateMember()</text>
  </g>

  <!-- Service -->
  <g transform="translate(75 450)">
    <rect width="260" height="220" class="box"/>
    <path d="M0 42 H260" class="head"/>
    <path d="M0 151 H260" class="line"/>
    <text x="130" y="27" text-anchor="middle" class="name">Service</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ name: string</text>
    <text x="14" y="109" class="txt">+ price: bigint</text>
    <text x="14" y="131" class="txt">+ billingType: BillingType</text>
    <text x="14" y="176" class="txt">+ calculate(quantity)</text>
    <text x="14" y="198" class="txt">+ updatePrice()</text>
  </g>

  <!-- ContractService -->
  <g transform="translate(75 760)">
    <rect width="310" height="220" class="box"/>
    <path d="M0 42 H310" class="head"/>
    <path d="M0 151 H310" class="line"/>
    <text x="155" y="27" text-anchor="middle" class="name">ContractService</text>
    <text x="14" y="65" class="txt">+ serviceName: string</text>
    <text x="14" y="87" class="txt">+ unit: string</text>
    <text x="14" y="109" class="txt">+ price: bigint</text>
    <text x="14" y="131" class="txt">+ openingReading: number?</text>
    <text x="14" y="176" class="txt">+ calculateCharge()</text>
    <text x="14" y="198" class="txt">+ validateReading()</text>
  </g>

  <!-- Invoice -->
  <g transform="translate(430 790)">
    <rect width="300" height="230" class="box"/>
    <path d="M0 42 H300" class="head"/>
    <path d="M0 151 H300" class="line"/>
    <text x="150" y="27" text-anchor="middle" class="name">Invoice</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ billingMonth: date</text>
    <text x="14" y="109" class="txt">+ status: InvoiceStatus</text>
    <text x="14" y="131" class="txt">+ totalAmount: bigint</text>
    <text x="14" y="176" class="txt">+ calculateTotal()</text>
    <text x="14" y="198" class="txt">+ markPaid()</text>
    <text x="14" y="220" class="txt">+ cancel()</text>
  </g>

  <!-- InvoiceItem -->
  <g transform="translate(755 790)">
    <rect width="315" height="230" class="box"/>
    <path d="M0 42 H315" class="head"/>
    <path d="M0 173 H315" class="line"/>
    <text x="157.5" y="27" text-anchor="middle" class="name">InvoiceItem</text>
    <text x="14" y="65" class="txt">+ itemName: string</text>
    <text x="14" y="87" class="txt">+ unitPrice: bigint</text>
    <text x="14" y="109" class="txt">+ previousReading: number?</text>
    <text x="14" y="131" class="txt">+ currentReading: number?</text>
    <text x="14" y="153" class="txt">+ amount: bigint</text>
    <text x="14" y="198" class="txt">+ calculateAmount()</text>
    <text x="14" y="220" class="txt">+ validate()</text>
  </g>

  <!-- MeterSubmission -->
  <g transform="translate(1080 760)">
    <rect width="320" height="245" class="box"/>
    <path d="M0 42 H320" class="head"/>
    <path d="M0 173 H320" class="line"/>
    <text x="160" y="27" text-anchor="middle" class="name">MeterReadingSubmission</text>
    <text x="14" y="65" class="txt">+ id: UUID</text>
    <text x="14" y="87" class="txt">+ imagePath: string</text>
    <text x="14" y="109" class="txt">+ status: SubmissionStatus</text>
    <text x="14" y="131" class="txt">+ aiProvider: string</text>
    <text x="14" y="153" class="txt">+ confirmedAt: datetime?</text>
    <text x="14" y="198" class="txt">+ confirm()</text>
    <text x="14" y="220" class="txt">+ reject()</text>
    <text x="14" y="242" class="txt">+ correct(value)</text>
  </g>

  <!-- Service layer -->
  <rect x="1440" y="80" width="445" height="1080" class="group"/>
  <text x="1465" y="112" class="group-title">Dịch vụ ứng dụng và tích hợp</text>

  <g transform="translate(1490 150)">
    <rect width="345" height="190" class="service"/>
    <path d="M0 42 H345" class="head-service"/>
    <path d="M0 119 H345" class="line"/>
    <text x="172.5" y="27" text-anchor="middle" class="name">ContractApplicationService</text>
    <text x="14" y="67" class="txt">+ createContract(input)</text>
    <text x="14" y="91" class="txt">+ validateRoom(roomId)</text>
    <text x="14" y="115" class="txt">+ snapshotServices()</text>
    <text x="14" y="146" class="txt">+ saveOpeningReadings()</text>
    <text x="14" y="170" class="txt">+ terminateContract()</text>
  </g>

  <g transform="translate(1490 405)">
    <rect width="345" height="190" class="service"/>
    <path d="M0 42 H345" class="head-service"/>
    <path d="M0 119 H345" class="line"/>
    <text x="172.5" y="27" text-anchor="middle" class="name">InvoiceApplicationService</text>
    <text x="14" y="67" class="txt">+ createInvoice(input)</text>
    <text x="14" y="91" class="txt">+ createBulkInvoices()</text>
    <text x="14" y="115" class="txt">+ resolvePreviousReading()</text>
    <text x="14" y="146" class="txt">+ markPaid(invoiceId)</text>
    <text x="14" y="170" class="txt">+ sendViaZalo()</text>
  </g>

  <g transform="translate(1490 660)">
    <rect width="345" height="205" class="service"/>
    <path d="M0 42 H345" class="head-service"/>
    <path d="M0 129 H345" class="line"/>
    <text x="172.5" y="27" text-anchor="middle" class="name">OcrGateway</text>
    <text x="14" y="67" class="txt">+ extractCccd(images)</text>
    <text x="14" y="91" class="txt">+ extractMeter(image)</text>
    <text x="14" y="115" class="txt">+ fallbackProvider()</text>
    <text x="14" y="156" class="txt">Gemini Vision API</text>
    <text x="14" y="180" class="txt">Groq Vision API</text>
  </g>

  <g transform="translate(1490 930)">
    <rect width="345" height="155" class="external"/>
    <path d="M0 42 H345" class="head-external"/>
    <path d="M0 105 H345" class="line"/>
    <text x="172.5" y="27" text-anchor="middle" class="name">ZaloBotClient</text>
    <text x="14" y="69" class="txt">+ sendText(chatId, text)</text>
    <text x="14" y="93" class="txt">+ processWebhook(payload)</text>
    <text x="14" y="132" class="txt">Zalo Bot API</text>
  </g>

  <!-- Domain associations -->
  <path d="M350 230 H435" class="assoc"/>
  <polygon points="350,230 365,222 365,238" class="diamond"/>
  <text x="363" y="217" class="label">1</text><text x="410" y="217" class="label">*</text>

  <path d="M685 230 H780" class="assoc"/>
  <polygon points="685,230 700,222 700,238" class="diamond"/>
  <text x="698" y="217" class="label">1</text><text x="755" y="217" class="label">*</text>

  <path d="M925 365 V405 H760 V450" class="assoc"/>
  <text x="937" y="390" class="label">1</text><text x="773" y="438" class="label">0..*</text>

  <path d="M1245 320 V405 H850 V450" class="assoc"/>
  <text x="1256" y="350" class="label">1</text><text x="865" y="438" class="label">0..*</text>
  <text x="1020" y="394" class="label">main tenant</text>

  <path d="M920 540 H1000" class="assoc"/>
  <polygon points="920,540 935,532 935,548" class="diamond"/>
  <text x="931" y="527" class="label">1</text><text x="976" y="527" class="label">0..*</text>

  <path d="M205 670 V760" class="assoc"/>
  <polygon points="205,670 197,685 213,685" class="diamond"/>
  <text x="218" y="700" class="label">1</text><text x="218" y="748" class="label">0..*</text>

  <path d="M600 650 H410 V870 H385" class="assoc"/>
  <polygon points="600,650 585,642 585,658" class="diamond"/>
  <text x="568" y="638" class="label">1</text><text x="397" y="856" class="label">1..*</text>

  <path d="M760 695 V740 H580 V790" class="assoc"/>
  <polygon points="760,695 752,710 768,710" class="diamond"/>
  <text x="774" y="718" class="label">1</text><text x="592" y="780" class="label">0..*</text>

  <path d="M730 900 H755" class="assoc"/>
  <polygon points="730,900 745,892 745,908" class="diamond"/>
  <text x="738" y="887" class="label">1</text><text x="743" y="924" class="label">1..*</text>

  <path d="M920 640 H1220 V760" class="assoc"/>
  <text x="935" y="627" class="label">1</text><text x="1232" y="748" class="label">0..*</text>

  <!-- Dependencies to service layer -->
  <path d="M920 510 C1180 420 1340 260 1490 245" class="dependency"/>
  <text x="1250" y="354" class="label">được quản lý bởi</text>

  <path d="M730 850 C1080 760 1280 510 1490 500" class="dependency"/>
  <text x="1250" y="667" class="label">được tạo bởi</text>

  <path d="M1400 850 C1430 830 1450 780 1490 762" class="dependency"/>
  <text x="1395" y="818" class="label">nhận dạng</text>

  <path d="M1400 940 C1435 965 1450 995 1490 1005" class="dependency"/>
  <text x="1393" y="960" class="label">xác nhận qua Zalo</text>

  <path d="M1490 550 C1410 600 1350 760 1330 840" class="dependency"/>
  <path d="M1660 865 V930" class="dependency"/>

  <text x="960" y="1178" text-anchor="middle" class="small">
    Sơ đồ thể hiện các lớp nghiệp vụ chính và các dịch vụ xử lý; dữ liệu lưu trữ thực tế được ánh xạ sang PostgreSQL/Supabase.
  </text>
</svg>
